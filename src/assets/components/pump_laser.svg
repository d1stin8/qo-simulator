<svg width="100" height="100" viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="casing" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4a4d52"/>
      <stop offset="50%" stop-color="#2a2d34"/>
      <stop offset="100%" stop-color="#14151a"/>
    </linearGradient>
    <linearGradient id="aperture" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ddc667"/>
      <stop offset="100%" stop-color="#b49339"/>
    </linearGradient>
  </defs>
  <!-- Main Body -->
  <rect x="5" y="20" width="80" height="60" rx="4" fill="url(#casing)" stroke="#111" stroke-width="2"/>
  <!-- Heatsink lines -->
  <line x1="15" y1="20" x2="15" y2="80" stroke="#111" stroke-width="2"/>
  <line x1="25" y1="20" x2="25" y2="80" stroke="#111" stroke-width="2"/>
  <line x1="35" y1="20" x2="35" y2="80" stroke="#111" stroke-width="2"/>
  <line x1="45" y1="20" x2="45" y2="80" stroke="#111" stroke-width="2"/>
  <!-- Aperture extension -->
  <rect x="85" y="32" width="10" height="36" rx="2" fill="url(#aperture)" stroke="#554411" stroke-width="1"/>
  <!-- Center aligned emission point -->
  <circle cx="95" cy="50" r="8" fill="#ccffff" stroke="#ffffff" stroke-width="2"/>
</svg>
